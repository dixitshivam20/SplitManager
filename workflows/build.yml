name: Build SplitManager APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # ── Debug APK ──────────────────────────────────────────────────────────
      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SplitManager-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Release APK ────────────────────────────────────────────────────────
      - name: Clean up any stale keystore
        run: rm -f app/keystore.jks

      - name: Prepare keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Restoring keystore from secret..."
            printf "%s" "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
          else
            echo "No secret — generating temporary keystore..."
            if [ -z "$STORE_PASS" ]; then STORE_PASS="splitmanager_temp_123"; fi
            if [ -z "$KEY_PASS" ];   then KEY_PASS="splitmanager_temp_123";   fi
            keytool -genkeypair \
              -alias splitmanager \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -keystore app/keystore.jks \
              -storepass "$STORE_PASS" \
              -keypass "$KEY_PASS" \
              -dname "CN=SplitManager, OU=Personal, O=Personal, L=Bengaluru, S=Karnataka, C=IN" \
              -noprompt
          fi
          if [ ! -s app/keystore.jks ]; then
            echo "ERROR: keystore missing or empty"
            exit 1
          fi
          echo "Keystore ready — $(du -sh app/keystore.jks | cut -f1)"

      # Pass all signing params via env — shell handles fallback values cleanly
      - name: Build Release APK
        env:
          KEYSTORE_FILE: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Apply fallbacks in shell — avoids invalid GitHub Actions ternary syntax
          export KEYSTORE_PASSWORD="${KEYSTORE_PASSWORD:-splitmanager_temp_123}"
          export KEY_ALIAS="${KEY_ALIAS:-splitmanager}"
          export KEY_PASSWORD="${KEY_PASSWORD:-splitmanager_temp_123}"
          gradle assembleRelease --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SplitManager-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Show APK sizes
        run: |
          echo "=== Build complete ==="
          ls -lh app/build/outputs/apk/debug/app-debug.apk    2>/dev/null || echo "Debug APK not found"
          ls -lh app/build/outputs/apk/release/app-release.apk 2>/dev/null || echo "Release APK not found"
